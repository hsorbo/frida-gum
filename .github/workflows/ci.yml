name: CI

on:
  push:
  workflow_dispatch:

env:
  GUM_OPTIONS: '--enable-gumpp --enable-gumjs --enable-tests'

jobs:
  native:
    strategy:
      matrix:
        include:
          - { id: windows-x86_64, runner: '"windows-latest"'                    }
          - { id: windows-x86,    runner: '"windows-latest"'                    }
          - { id: windows-arm64,  runner: '"windows-11-arm"'                    }
          - { id: macos-x86_64,   runner: '"macos-latest"'                      }
          - { id: macos-arm64,    runner: '"macos-latest"'                      }
          - { id: linux-x86_64,   runner: '"ubuntu-latest"'                     }
          - { id: linux-x86,      runner: '"ubuntu-latest"'                     }
      fail-fast: false
    runs-on: ${{ fromJSON(matrix.runner) }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install gcc-multilib
        if: matrix.id == 'linux-x86'
        run: |
          sudo apt-get update
          sudo apt-get install gcc-multilib lib32stdc++-13-dev
      - name: Install Rosetta
        if: matrix.id == 'macos-x86_64'
        run: |
          softwareupdate --install-rosetta --agree-to-license
          echo 'int main (void) { return 0; }' > /tmp/warmup.c
          arch -x86_64 clang -arch x86_64 -dynamiclib /tmp/warmup.c \
              -o /tmp/warmup.dylib
      - name: Build
        if: ${{ startsWith(matrix.id, 'windows-') }}
        run: |
          .\configure ${{ env.GUM_OPTIONS }}
          .\make
      - name: Build
        if: ${{ !startsWith(matrix.id, 'windows-') && matrix.id != 'linux-x86' && matrix.id != 'macos-x86_64' }}
        run: |
          ./configure ${{ env.GUM_OPTIONS }}
          make
      - name: Build
        if: matrix.id == 'macos-x86_64'
        run: |
          ./configure --host=macos-x86_64 ${{ env.GUM_OPTIONS }}
          make
      - name: Build
        if: matrix.id == 'linux-x86'
        run: |
          CC="gcc -m32" CXX="g++ -m32" STRIP="strip" \
              ./configure --build=linux-x86 --host=linux-x86 ${{ env.GUM_OPTIONS }}
          make
      - name: Test
        run: make test
      - name: Collect crash reports
        if: failure() && startsWith(matrix.id, 'macos-')
        run: |
          mkdir -p /tmp/crashes
          for i in $(seq 1 15); do
            ls ~/Library/Logs/DiagnosticReports/gum-tests-*.ips >/dev/null 2>&1 && break
            sleep 2
          done
          cp -a ~/Library/Logs/DiagnosticReports/. /tmp/crashes/ 2>/dev/null || true
          cp -a  /Library/Logs/DiagnosticReports/. /tmp/crashes/ 2>/dev/null || true
          cp build/meson-logs/testlog.txt /tmp/crashes/ 2>/dev/null || true
      - name: Upload crash reports
        if: failure() && startsWith(matrix.id, 'macos-')
        uses: actions/upload-artifact@v7
        with:
          name: crash-reports-${{ matrix.id }}
          path: /tmp/crashes/
          if-no-files-found: warn
